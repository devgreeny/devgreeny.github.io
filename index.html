<style>
:root{
  --bg:#f5f5f7; --panel:#ffffff; --panel2:#f5f5f7; --line:#e3e3e8;
  --text:#1d1d1f; --muted:#6e6e73; --dim:#86868b;
  --accent:#0071e3; --accent2:#0077ed; --green:#34c759; --amber:#6e6e73;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
  --display:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,.grotesk{font-family:var(--display),sans-serif}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px}

/* nav */
nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:22px}
.logo{font-family:var(--display);font-weight:700;font-size:17px;color:var(--text);letter-spacing:.5px}
.logo b{color:var(--accent)}
.nav-links{display:flex;gap:20px;margin-left:auto;align-items:center}
.nav-links a{color:var(--muted);font-size:14px;font-weight:500}
.nav-links a:hover{color:var(--text);text-decoration:none}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:8px;font-weight:600;font-size:14px;border:1px solid var(--line);color:var(--text);transition:all .15s}
.btn:hover{text-decoration:none;border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent2);color:#fff}

/* hero */
header#hero{padding:100px 24px 24px}
.eyebrow{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:18px}
h1{font-size:clamp(44px,7vw,76px);line-height:1.02;font-weight:700;letter-spacing:-1px}
.headline{font-size:clamp(19px,2.6vw,24px);color:var(--text);margin-top:22px;max-width:760px;font-weight:500}
.sub{color:var(--muted);margin-top:18px;max-width:880px;font-size:17px;line-height:1.65}
.hero-actions{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
.hero-links{display:flex;gap:18px;margin-top:26px;flex-wrap:wrap}
.hero-links a{color:var(--muted);font-size:14px;display:inline-flex;align-items:center;gap:7px}
.hero-links a:hover{color:var(--accent);text-decoration:none}
.hero-links svg{width:17px;height:17px;fill:currentColor}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:50px 0 0}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px}
.stat .n{font-family:var(--display);font-size:30px;font-weight:700;color:var(--accent)}
.stat .l{color:var(--muted);font-size:13px;margin-top:4px}

/* sections */
section{padding:48px 0 10px}
.sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:34px}
.sec-head h2{font-size:30px;font-weight:700;letter-spacing:-.5px}
.sec-head .rule{flex:1;height:1px;background:var(--line)}
.sec-head .count{color:var(--dim);font-size:14px;font-family:var(--display)}

/* project cards */
.project{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:30px}
.p-media{background:var(--panel2);position:relative}
.p-media video,.p-media>img{display:block;width:100%;max-height:560px;object-fit:contain;background:var(--panel2)}
.p-caption{position:absolute;left:0;right:0;bottom:0;padding:26px 20px 10px;background:linear-gradient(transparent,rgba(0,0,0,.78));color:#cfd6e2;font-size:13px;pointer-events:none}
.p-body{padding:26px 28px 28px}
.p-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.p-top h3{font-size:24px;font-weight:700}
.status{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;color:var(--green);border:1px solid rgba(61,220,132,.35);padding:4px 10px;border-radius:99px}
.status .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.status.amber{color:var(--amber);border-color:rgba(245,185,66,.4)}
.status.amber .dot{background:var(--amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.p-period{color:var(--dim);font-size:13.5px;margin-left:auto;font-family:var(--display)}
.p-tagline{color:var(--text);font-weight:500;font-size:16.5px;margin-top:10px}
.p-blurb{color:var(--muted);font-size:15px;margin-top:8px;max-width:860px}
.p-bullets{margin:16px 0 0;list-style:none}
.p-bullets li{color:var(--muted);font-size:14.5px;padding-left:20px;position:relative;margin-bottom:7px}
.p-bullets li::before{content:"▸";position:absolute;left:2px;color:var(--accent)}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.tag{font-size:12.5px;font-weight:500;color:var(--muted);background:var(--panel2);border:1px solid var(--line);padding:4px 11px;border-radius:99px}
.p-links{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.shots{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:10px;background:#0d1016}
.shots img{width:100%;height:340px;object-fit:cover;object-position:center top;border-radius:8px;border:1px solid var(--line);display:block}
.phone-layout .shots img{height:auto;object-fit:contain}
.phone-layout{display:grid;grid-template-columns:300px 1fr;gap:10px;background:#0d1016;padding:10px}
.phone-layout video{width:100%;border-radius:12px;border:1px solid var(--line);background:#000}
.phone-layout .shots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0;align-content:center}
.terminal{background:#0c0f14;font-family:'SF Mono',Menlo,monospace;font-size:13.5px;line-height:1.7;padding:22px 26px;color:#9fb3c8;border-bottom:1px solid var(--line)}
.terminal .tbar{display:flex;gap:7px;margin-bottom:14px}
.terminal .tbar i{width:11px;height:11px;border-radius:50%;background:#2a3140;display:block}
.terminal .ok{color:var(--green)}
.terminal .prompt{color:var(--accent)}

/* experience */
.xp{border-left:2px solid var(--line);margin-left:8px;padding-left:30px}
.xp-item{position:relative;margin-bottom:38px}
.xp-item::before{content:"";position:absolute;left:-37px;top:7px;width:12px;height:12px;border-radius:50%;background:var(--bg);border:2.5px solid var(--accent)}
.xp-company{font-family:var(--display);font-size:20px;font-weight:700}
.xp-loc{color:var(--dim);font-size:13.5px;font-weight:400;margin-left:8px}
.xp-role{margin-top:14px}
.xp-role .rt{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.xp-role h4{font-size:15.5px;font-weight:600;color:var(--text)}
.xp-role .period{color:var(--dim);font-size:13px;font-family:var(--display)}
.xp-role ul{list-style:none;margin-top:8px}
.xp-role li{color:var(--muted);font-size:14.5px;padding-left:18px;position:relative;margin-bottom:6px}
.xp-role li::before{content:"–";position:absolute;left:0;color:var(--dim)}

/* education + skills */
.edu{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px 28px}
.edu h3{font-size:19px}
.edu .deg{color:var(--muted);margin-top:6px;font-size:15px}
.edu .extra{color:var(--dim);margin-top:6px;font-size:14px}
.edu .period{color:var(--dim);font-size:13px;font-family:var(--display);margin-top:4px}
.skill-groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.sg{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px}
.sg h3{font-size:13px;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
.sg .tags{margin-top:0}

/* footer */
footer{margin-top:90px;border-top:1px solid var(--line);padding:60px 0 70px}
.foot-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
footer h2{font-size:28px;letter-spacing:-.5px}
footer .fsub{color:var(--muted);margin-top:8px;font-size:15px}
.foot-meta{margin-top:46px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;color:var(--dim);font-size:12.5px}

@media (max-width:720px){
  .nav-links a:not(.btn){display:none}
  header{padding-top:120px}
  .p-body{padding:20px}
  .phone-layout{grid-template-columns:1fr}
  .phone-layout video{max-width:300px;margin:0 auto}
  .p-period{margin-left:0;width:100%}
}

/* gallery (filmstrip: items sit side by side, free horizontal scroll) */
.gallery{position:relative;padding:14px 0 6px}
.g-track{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x proximity;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 20px;scroll-padding:20px}
.g-track::-webkit-scrollbar{display:none}
.g-item{flex:0 0 auto;height:400px;border-radius:14px;overflow:hidden;background:var(--panel2);border:1px solid var(--line);scroll-snap-align:start}
.gallery.portrait .g-item{height:460px}
.g-item video,.g-item img{display:block;height:100%;width:auto;background:var(--panel2)}
.g-arr{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);color:#1d1d1f;font-size:24px;line-height:1;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;z-index:3;opacity:0;transition:opacity .2s}
.gallery:hover .g-arr{opacity:1}
.g-arr.prev{left:12px}.g-arr.next{right:12px}
.g-arr:disabled{opacity:0!important;pointer-events:none}

/* iOS light polish */
.stat,.project,.edu,.sg{box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 32px rgba(0,0,0,.05);border-color:#ececf0}
.project{border-radius:18px}
.stat,.edu,.sg{border-radius:16px}
.btn,.tag{border-radius:980px}
.btn{padding:9px 20px}
.eyebrow{color:var(--muted)}
.stat .n{color:var(--text)}
.sg h3{color:var(--muted)}
.p-bullets li::before{content:"•";left:3px;color:var(--dim)}
.xp-role li::before{color:var(--dim)}
.xp-item::before{background:var(--bg)}
h1{letter-spacing:-1.5px;font-weight:600}
.terminal{background:#1d1d1f;color:#d1d1d6;border:none;border-radius:14px;margin:14px;width:auto}
.terminal .tbar i{background:#48484a}
</style>
</head>

<script>
const D = JSON.parse(document.getElementById('site-data').textContent);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
const P = D.profile;

document.getElementById('resume-btn').href = P.resume;

/* hero */
document.getElementById('hero').innerHTML = `
  <div class="eyebrow">${esc(P.location)}</div>
  <h1>${esc(P.name)}</h1>
  <p class="sub">${esc(P.sub)}</p>
  <div class="hero-actions">
    <a class="btn primary" href="#projects">See the work</a>
    <a class="btn" href="${P.resume}" download>Download resume</a>

    <a href="${P.linkedin}" target="_blank" rel="noopener"><svg viewBox="0 0 16 16"><path d="M12.225 12.225h-1.778V9.44c0-.664-.012-1.519-.925-1.519-.926 0-1.068.724-1.068 1.47v2.834H6.676V6.498h1.707v.783h.024c.348-.594.996-.95 1.684-.925 1.802 0 2.135 1.185 2.135 2.728l-.001 3.14zM4.67 5.715a1.037 1.037 0 0 1-1.032-1.031c0-.566.466-1.032 1.032-1.032.566 0 1.031.466 1.032 1.032 0 .566-.466 1.032-1.032 1.032zm.889 6.51h-1.78V6.498h1.78v5.727zM13.11 2H2.885A.88.88 0 0 0 2 2.866v10.268a.88.88 0 0 0 .885.866h10.226a.882.882 0 0 0 .889-.866V2.865a.88.88 0 0 0-.889-.864z"/></svg>LinkedIn</a>
    <a href="mailto:${P.email}"><svg viewBox="0 0 16 16"><path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555zM0 4.697v7.104l5.803-3.558L0 4.697zM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757zm3.436-.586L16 11.801V4.697l-5.803 3.546z"/></svg>${esc(P.email)}</a>

/* projects */
const statusClass = s => /live|production|24\/7/.test(s) ? 'status' : 'status amber';
const itemHTML = it => it.video
  ? `<div class="g-item"><video src="${it.video}" poster="${it.poster||''}" muted loop playsinline preload="metadata"${it.audio?' controls':''}></video></div>`
  : `<div class="g-item"><img src="${it.img}" alt="" loading="lazy"></div>`;
const mediaHTML = m => {
  if (!m) return '';
  if (m.type === 'terminal') return `
    <div class="terminal"><div class="tbar"><i></i><i></i><i></i></div>
    ${m.lines.map(l=>{
      let h = esc(l).replace(/\(healthy\)/g,'<span class="ok">(healthy)</span>');
      if (h.startsWith('$')) h = `<span class="prompt">$</span>${h.slice(1)}`;
      return `<div>${h}</div>`;
    }).join('')}</div>`;
  // build the item list: prefer an explicit gallery, else fall back to legacy type/src/shots
  let items = m.gallery ? m.gallery.slice() : [];
  if (!items.length) {
    if (m.src && m.type === 'image') items.push({ img: m.src });
    else if (m.src) items.push({ video: m.src, poster: m.poster });
    (m.shots || []).forEach(s => items.push({ img: s }));
  }
  if (!items.length) return '';
  const multi = items.length > 1;
  return `
    <div class="gallery${m.portrait?' portrait':''}">
      <div class="g-track">${items.map(itemHTML).join('')}</div>
      ${multi?`<button class="g-arr prev" aria-label="Scroll left">&#8249;</button><button class="g-arr next" aria-label="Scroll right">&#8250;</button>`:''}
    </div>`;
};

document.getElementById('projects').innerHTML = `
  <div class="sec-head"><h2>Projects</h2><div class="rule"></div></div>
  ${D.projects.map(p=>`
  <article class="project"${p.anchor?` id="${p.anchor}"`:''}>
    ${mediaHTML(p.media)}
    <div class="p-body">
      <div class="p-top">
        <h3>${esc(p.name)}</h3>
        <span class="${statusClass(p.status)}"><span class="dot"></span>${esc(p.status)}</span>
        <span class="p-period">${esc(p.period)}</span>
      </div>
      <p class="p-tagline">${esc(p.tagline)}</p>
      <p class="p-blurb">${esc(p.blurb)}</p>
      <ul class="p-bullets">${p.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>
      <div class="tags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      ${p.links.length?`<div class="p-links">${p.links.map(l=>`<a class="btn" href="${l.url}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`).join('')}</div>`:''}
    </div>
  </article>`).join('')}
`;

document.getElementById('foot').innerHTML = `

    </div>

    </div>
  </div>
  <div class="foot-meta">
    <span>© ${new Date().getFullYear()} ${esc(P.name)}</span>
    <span>Last updated ${esc(P.updated)}</span>
  </div>
`;

/* play every on-screen video at once; pause off-screen ones to save resources */
const vidObserver = new IntersectionObserver(es => es.forEach(e => {
  if (e.isIntersecting) e.target.play().catch(()=>{}); else e.target.pause();
}), { threshold: 0.25 });
document.querySelectorAll('.g-item video').forEach(v => vidObserver.observe(v));

/* galleries: free horizontal scroll + paging arrows */
document.querySelectorAll('.gallery').forEach(g => {
  const track = g.querySelector('.g-track');
  const prev = g.querySelector('.g-arr.prev');
  const next = g.querySelector('.g-arr.next');

  const updateArrows = () => {
    const max = track.scrollWidth - track.clientWidth - 2;
    if (prev) prev.disabled = track.scrollLeft <= 2;
    if (next) next.disabled = track.scrollLeft >= max;
  };

  const page = dir => track.scrollBy({ left: dir * track.clientWidth * 0.85, behavior:'smooth' });
  if (prev) prev.addEventListener('click', () => page(-1));
  if (next) next.addEventListener('click', () => page(1));

  let raf;
  track.addEventListener('scroll', () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(updateArrows); });

  // intrinsic widths arrive async (lazy images / video metadata); recompute as they load
  track.querySelectorAll('img').forEach(im => im.addEventListener('load', updateArrows));
  track.querySelectorAll('video').forEach(v => v.addEventListener('loadedmetadata', updateArrows));
  addEventListener('resize', updateArrows);

  updateArrows();
});
</script>
